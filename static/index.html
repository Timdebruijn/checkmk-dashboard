<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="pageTitle">Monitoring Dashboard</title>
  <link href="/static/vendor/bootstrap.min.css" rel="stylesheet"/>
  <link href="/static/vendor/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: #0f1117; color: #e0e0e0; }
    .navbar { background: #1a1d27 !important; border-bottom: 1px solid #2e3148; }
    .card  { background: #1a1d27; border: 1px solid #2e3148; color: #e0e0e0; }
    .card-header { border-bottom: 1px solid #2e3148; font-weight: 600; letter-spacing: .03em; color: #e0e0e0; }
    .table {
      --bs-table-bg: transparent;
      --bs-table-color: #e0e0e0;
      --bs-table-striped-color: #e0e0e0;
      --bs-table-striped-bg: #20232f;
      --bs-table-hover-color: #e0e0e0;
      --bs-table-hover-bg: #252836;
      color: #e0e0e0;
    }
    .table thead th { border-color: #2e3148; color: #9aa0b4; font-size: .8rem; text-transform: uppercase; letter-spacing: .07em; }
    .table td, .table tr { border-color: #1e2130; vertical-align: middle; color: #e0e0e0; }
    .badge-crit  { background: #e74c3c; }
    .badge-warn  { background: #f39c12; }
    .badge-ack   { background: #2980b9; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .text-muted { color: #9aa0b4 !important; }
    .last-update { font-size: .78rem; color: #9aa0b4; }
    .ticket-badge { font-size: .7rem; background: #1abc9c; border-radius: 4px; padding: 1px 6px; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 px-4 py-3">
  <span class="navbar-brand fw-bold"><i class="bi bi-activity me-2"></i><span id="navTitle">Monitoring Dashboard</span></span>
  <span class="text-muted small me-3" id="siteLabel"></span>
  <span class="last-update" id="lastUpdate">Loading...</span>
</nav>

<div class="container-fluid px-4">

  <!-- Summary bar -->
  <div class="row g-3 mb-4">
    <div class="col-auto">
      <div class="card px-4 py-3 text-center">
        <div class="fs-2 fw-bold text-danger" id="countCrit">–</div>
        <div class="text-muted small">Critical</div>
      </div>
    </div>
    <div class="col-auto">
      <div class="card px-4 py-3 text-center">
        <div class="fs-2 fw-bold text-warning" id="countWarn">–</div>
        <div class="text-muted small">Warning</div>
      </div>
    </div>
    <div class="col-auto">
      <div class="card px-4 py-3 text-center">
        <div class="fs-2 fw-bold text-info" id="countAck">–</div>
        <div class="text-muted small">Acknowledged</div>
      </div>
    </div>
  </div>

  <!-- Critical -->
  <div class="card mb-4">
    <div class="card-header d-flex align-items-center gap-2">
      <span class="badge badge-crit pulse">CRITICAL</span>
      Open critical issues
    </div>
    <div class="card-body p-0">
      <table class="table table-striped table-hover mb-0">
        <thead><tr>
          <th>Host</th><th>Service</th><th>Message</th><th>Since</th>
        </tr></thead>
        <tbody id="tableCrit"><tr><td colspan="4" class="text-center text-muted py-3">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Warning -->
  <div class="card mb-4">
    <div class="card-header d-flex align-items-center gap-2">
      <span class="badge badge-warn">WARNING</span>
      Open warnings
    </div>
    <div class="card-body p-0">
      <table class="table table-striped table-hover mb-0">
        <thead><tr>
          <th>Host</th><th>Service</th><th>Message</th><th>Since</th>
        </tr></thead>
        <tbody id="tableWarn"><tr><td colspan="4" class="text-center text-muted py-3">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Acknowledged -->
  <div class="card mb-4">
    <div class="card-header d-flex align-items-center gap-2">
      <span class="badge badge-ack">ACKNOWLEDGED</span>
      In progress (with ticket number)
    </div>
    <div class="card-body p-0">
      <table class="table table-striped table-hover mb-0">
        <thead><tr>
          <th>Host</th><th>Service</th><th>Message</th><th>Ticket</th><th>Since</th>
        </tr></thead>
        <tbody id="tableAck"><tr><td colspan="5" class="text-center text-muted py-3">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const REFRESH_MS = 30_000; // refresh every 30 seconds

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function formatDate(ts) {
  if (!ts) return '–';
  const d = new Date(ts * 1000);
  return d.toLocaleString('en-GB', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function extractTicket(comment) {
  const m = comment.match(/[A-Z][A-Z0-9]*-\d+/i);
  return m ? m[0].toUpperCase() : comment;
}

function renderTable(tbodyId, rows, cols) {
  const tbody = document.getElementById(tbodyId);
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="${cols}" class="text-center text-muted py-3">No issues <i class="bi bi-check-circle text-success"></i></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => {
    if (tbodyId === 'tableAck') {
      return `<tr>
        <td><i class="bi bi-hdd-rack me-1 text-muted"></i>${escapeHtml(r.host)}</td>
        <td>${escapeHtml(r.service)}</td>
        <td class="text-muted small">${escapeHtml(r.output)}</td>
        <td><span class="ticket-badge">${escapeHtml(extractTicket(r.ack_comment))}</span></td>
        <td class="text-muted small">${formatDate(r.last_change)}</td>
      </tr>`;
    }
    return `<tr>
      <td><i class="bi bi-hdd-rack me-1 text-muted"></i>${escapeHtml(r.host)}</td>
      <td>${escapeHtml(r.service)}</td>
      <td class="text-muted small">${escapeHtml(r.output)}</td>
      <td class="text-muted small">${formatDate(r.last_change)}</td>
    </tr>`;
  }).join('');
}

async function loadConfig() {
  try {
    const res  = await fetch('/api/config');
    const cfg  = await res.json();
    document.getElementById('pageTitle').textContent = cfg.title;
    document.getElementById('navTitle').textContent  = cfg.title;
    if (cfg.site) {
      document.getElementById('siteLabel').textContent = `Site: ${cfg.site}`;
    }
  } catch(e) { /* non-fatal */ }
}

async function refresh() {
  try {
    const res  = await fetch('/api/problems');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    document.getElementById('countCrit').textContent = data.critical.length;
    document.getElementById('countWarn').textContent = data.warning.length;
    document.getElementById('countAck').textContent  = data.acknowledged.length;

    renderTable('tableCrit', data.critical, 4);
    renderTable('tableWarn', data.warning,  4);
    renderTable('tableAck',  data.acknowledged, 5);

    document.getElementById('lastUpdate').textContent =
      'Last updated: ' + new Date().toLocaleTimeString('en-GB');
  } catch(e) {
    // Show error but keep existing table data
    document.getElementById('lastUpdate').textContent =
      '⚠️ Connection error – last updated: ' + new Date().toLocaleTimeString('en-GB');
  }
}

loadConfig();
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
